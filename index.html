    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body,html{width:100%;height:100%;overflow:hidden;font-family:"Segoe UI","微软雅黑","PingFang SC",sans-serif;background:#08121a;}
        #map-container{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1;}
        
        /* 顶部章节条 */
        .chapter-bar{
            position:absolute;top:0;left:0;right:0;z-index:9999;
            background:rgba(12,22,33,0.98);backdrop-filter:blur(12px);
            padding:12px 16px;display:flex;align-items:center;gap:10px;
            border-bottom:1px solid rgba(20,184,166,0.3);
            height:56px;
        }
        .chapter-step{
            flex:1;text-align:center;font-size:12px;color:#7a8ca3;
            padding:8px 6px;border-radius:22px;transition:all 0.4s;position:relative;
            cursor:pointer;user-select:none;font-weight:500;
        }
        .chapter-step:hover{color:#cbd5e1;}
        .chapter-step.active{color:#ffffff;font-weight:700;}
        .chapter-step.active[data-phase="begin"]{background:linear-gradient(135deg,#0d9488,#14b8a6);}
        .chapter-step.active[data-phase="develop"]{background:linear-gradient(135deg,#d9706,#f59e0b);}
        .chapter-step.active[data-phase="climax"]{background:linear-gradient(135deg,#dc2626,#ef4444);}
        .chapter-step.active[data-phase="end"]{background:linear-gradient(135deg,#7c3aed,#8b5cf6);}
        .chapter-step::after{content:'→';position:absolute;right:-6px;top:50%;transform:translateY(-50%);color:#475569;font-size:10px;}
        .chapter-step:last-child::after{display:none;}
        
        /* 控制按钮区 */
        .top-right-controls{
            position:absolute;top:62px;right:14px;z-index:9999;
            display:flex;gap:8px;
            background:rgba(12,22,33,0.9);backdrop-filter:blur(12px);
            padding:10px 12px;border-radius:16px;
            border:1px solid rgba(20,184,166,0.2);
        }
        .btn{
            padding:8px 14px;border:none;border-radius:10px;
            color:#ffffff;font-weight:600;cursor:pointer;font-size:12px;
            transition:all 0.3s;white-space:nowrap;
        }
        .btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
        .btn:disabled{background:linear-gradient(135deg,#1e293b,#0f172a);color:#64748b;cursor:not-allowed;}
        .btn-auto{background:linear-gradient(135deg,#b45309,#f97316);}
        .btn-reset{background:linear-gradient(135deg,#be123c,#ef4444);}
        .btn-layer{background:linear-gradient(135deg,#16a34a,#22c55e);}
        .speed-select{background:#1e293b;border-radius:10px;padding:4px 8px;color:white;font-size:12px;border:none;}
        
        /* 进度条 */
        .progress-bar{
            position:absolute;top:56px;left:0;right:0;z-index:9998;
            height:4px;background:rgba(255,255,255,0.08);
        }
        .progress-fill{
            height:100%;background:linear-gradient(90deg,#14b8a6,#22d3ee,#7c3aed);
            transition:width 0.6s ease;box-shadow:0 0 12px rgba(34,211,238,0.6);
            width:0%;
        }
        
        /* 左侧故事面板 */
        .story-panel{
            position:absolute;top:70px;left:14px;z-index:9999;
            background:rgba(12,22,33,0.95);backdrop-filter:blur(14px);
            border-radius:20px;padding:22px;width:360px;
            border:1px solid rgba(20,184,166,0.2);
            max-height:calc(100vh - 190px);
            overflow-y:auto;
            transition:opacity 0.4s, transform 0.4s;
            opacity:0;transform:translateX(-20px);pointer-events:none;
        }
        .story-panel.show{opacity:1;transform:translateX(0);pointer-events:auto;}
        .story-panel::-webkit-scrollbar{width:6px;}
        .story-panel::-webkit-scrollbar-thumb{background:rgba(20,184,166,0.4);border-radius:6px;}
        .dedication{font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(20,184,166,0.2);}
        .phase-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;}
        .phase-begin{background:linear-gradient(135deg,#0d9488,#14b8a6);color:#fff;}
        .phase-develop{background:linear-gradient(135deg,#d9706,#f59e0b);color:#fff;}
        .phase-climax{background:linear-gradient(135deg,#dc2626,#ef4444);animation:pulse 2.5s infinite;}
        .phase-end{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.3);}50%{box-shadow:0 0 0 8px rgba(220,38,38,0);}}
        .station-title{font-size:19px;font-weight:700;color:#f1f5f9;margin-bottom:10px;}
        .station-date{font-size:13px;color:#94a3b8;margin-bottom:14px;}
        .story-img{width:100%;height:170px;object-fit:cover;border-radius:16px;margin-bottom:16px;border:1px solid rgba(20,184,166,0.3);}
        .station-desc{font-size:14px;line-height:1.8;color:#cbd5e1;text-align:justify;}
        .quiz-area{margin-top:16px;background:rgba(20,184,166,0.15);border-radius:12px;padding:12px;}
        .quiz-area input{width:160px;background:#1e293b;border:none;padding:6px 10px;border-radius:20px;color:white;margin-right:6px;}
        .quiz-area button{background:#0d9488;border:none;border-radius:16px;padding:6px 12px;color:white;cursor:pointer;}
        .quiz-feedback{font-size:12px;margin-top:8px;color:#22d3ee;}
        .nav-buttons{display:flex;gap:12px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(20,184,166,0.2);}
        .nav-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s;color:#fff;}
        .nav-btn:hover{filter:brightness(1.15);transform:translateY(-2px);}
        .nav-prev{background:linear-gradient(135deg,#475569,#334155);}
        .nav-next{background:linear-gradient(135deg,#0d9488,#14b8a6);}
        
        /* 骑行中面板 */
        .riding-panel{
            position:absolute;top:70px;left:14px;z-index:9999;
            background:rgba(12,22,33,0.95);backdrop-filter:blur(14px);
            border-radius:20px;padding:22px;width:360px;
            border:1px solid rgba(20,184,166,0.2);
            display:none;
        }
        .riding-panel.active{display:block;animation:slideIn 0.4s ease;}
        @keyframes slideIn{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
        .riding-status{font-size:15px;color:#e2e8f0;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
        .riding-dot{width:10px;height:10px;border-radius:50%;background:#14b8a6;box-shadow:0 0 10px rgba(20,184,166,0.7);animation:blink 1s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
        .riding-route{font-size:14px;color:#cbd5e1;line-height:1.8;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(20,184,166,0.2);}
        .riding-info{font-size:13px;color:#94a3b8;}
        
        /* 右下角数据面板 */
        .data-panel{
            position:absolute;bottom:120px;right:24px;z-index:9999;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            backdrop-filter:blur(16px);border-radius:20px;padding:20px 22px;width:280px;
            box-shadow:0 8px 32px rgba(0,0,0,0.5);border:1px solid rgba(34,211,238,0.3);
        }
        .data-title{font-size:15px;font-weight:700;color:#22d3ee;margin-bottom:16px;text-shadow:0 0 4px rgba(34,211,238,0.3);}
        .data-item{display:flex;justify-content:space-between;padding:12px 0;font-size:13px;border-bottom:1px solid rgba(34,211,238,0.15);}
        .data-item span:first-child{color:#cbd5e1;font-weight:500;}
        .data-item span:last-child{color:#ffffff;font-weight:700;background:rgba(34,211,238,0.25);padding:4px 10px;border-radius:6px;text-shadow:0 0 3px rgba(0,0,0,0.5);}
        
        /* 提示弹窗 */
        .climax-toast,.ending-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);z-index:10000;padding:24px 42px;border-radius:22px;font-size:22px;font-weight:700;pointer-events:none;opacity:0;transition:0.5s;backdrop-filter:blur(12px);text-align:center;}
        .climax-toast{background:linear-gradient(135deg,rgba(220,38,38,0.95),rgba(239,68,68,0.9));color:#fff;}
        .ending-toast{background:linear-gradient(135deg,rgba(124,58,237,0.95),rgba(139,92,246,0.9));color:#fff;font-size:18px;}
        .climax-toast.show,.ending-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
        
        /* 底部里程滑块 */
        .slider-panel{
            position:absolute;bottom:40px;left:20px;right:20px;z-index:9999;
            background:rgba(12,22,33,0.95);backdrop-filter:blur(12px);
            border-radius:20px;padding:14px 22px;
            border:1px solid rgba(20,184,166,0.2);
            display:flex;gap:14px;align-items:center;
        }
        .slider-panel input{flex:1;height:5px;border-radius:4px;background:#334155;appearance:none;}
        .slider-panel input::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:#22d3ee;cursor:pointer;box-shadow:0 0 8px rgba(34,211,238,0.7);}
        .slider-label{color:#cbd5e1;font-size:13px;font-weight:500;white-space:nowrap;}

        @media (max-width:768px){
            .story-panel,.riding-panel{width:calc(100vw - 28px);left:14px;right:14px;top:70px;}
            .data-panel{width:calc(100vw - 40px);left:20px;right:20px;bottom:120px;}
            .top-right-controls{top:auto;bottom:40px;left:14px;right:14px;justify-content:center;}
            .slider-panel{bottom:40px;flex-wrap:wrap;}
        }
    </style>
</head>
<body>
    <div id="map-container"></div>
    <div class="chapter-bar">
        <div class="chapter-step active" data-phase="begin" data-chapter-start="0">东南启程</div>

            <option value="1.0">速度 x1</option>
            <option value="1.5">速度 x1.5</option>
            <option value="2.0">速度 x2</option>
        </select>

        <div class="dedication" id="dedication"></div>
        <div class="phase-tag" id="phaseTag"></div>
        <div class="station-title" id="stationTitle"></div>
        <div class="station-date" id="stationDate"></div>

        <div class="station-desc" id="stationDesc"></div>
        <div class="quiz-area" id="quizArea">

            <div><input type="text" id="quizAnswer" placeholder="输入答案"><button id="submitQuiz">回答</button></div>
            <div id="quizFeedback" class="quiz-feedback"></div>

            <button class="nav-btn nav-next" id="panelNextBtn">下一站 ▶</button>

    </div>
    <div class="riding-panel" id="ridingPanel">

        <div class="riding-route" id="ridingRoute"></div>
        <div class="riding-info" id="ridingInfo"></div>
    </div>
    <div class="data-panel">
        <div class="data-title">骑行实时数据</div>
        <div class="data-item"><span>已骑行天数</span><span id="data_days">0</span></div>
        <div class="data-item"><span>累计里程</span><span id="data_km">0 km</span></div>
        <div class="data-item"><span>途经省份</span><span id="data_prov">1</span></div>
        <div class="data-item"><span>当前海拔</span><span id="data_alt">0 m</span></div>
        <div class="data-item"><span>当前阶段</span><span id="data_stage">东南启程</span></div>
    </div>
    <div class="slider-panel">
        <span class="slider-label">🗺️ 里程滑条</span>
        <input type="range" id="mileageSlider" min="0" max="14000" value="0" step="10">
        <span id="sliderKm" class="slider-label">0 km</span>
    </div>
    <div class="climax-toast" id="climaxToast">🔥 进入高潮 · 青藏高原</div>
    <div class="ending-toast" id="endingToast">💜 圆满闭环<br>我用代码理解这片土地，幻想中的我，用车轮亲吻了它。</div>

    <script>
        // 地图初始化
        const map = new BMapGL.Map("map-container");
        const startPt = new BMapGL.Point(119.3002, 26.0805);
        map.centerAndZoom(startPt, 11);
        map.enableScrollWheelZoom(true);
        map.setMapType(BMAP_NORMAL_MAP);
        map.addControl(new BMapGL.ScaleControl({anchor:BMAP_ANCHOR_BOTTOM_LEFT}));
        
        const altitudes = [20,20,150,2000,500,3650,1500,20];
        const layerModes = [
            {type: BMAP_NORMAL_MAP, name: "标准图"},
            {type: BMAP_SATELLITE_MAP, name: "卫星图"},
            {type: BMAP_EARTH_MAP, name: "地球模式"}
        ];
        
        // 站点数据（原版不变）
        const baseStory = [
            {pt:startPt,name:"福州",title:"榕树下的出发",phase:"begin",stage:"东南启程",date:"2023-06-10",zoom:11,mapType:BMAP_NORMAL_MAP,dedication:"这个故事是假的。现实中我进入福建农林大学就读空间信息与数字技术专业。但幻想中的我，用车轮亲吻了课堂上处理过的每一寸土地。",desc:"六月的福州闷得要死，空气像一块湿毛巾捂在脸上。我在闽江边站了很久——每年这个时候我都说要走，但真要走的那天，还是犹豫了。我在车把绑了一面小旗子，写着：出发。",days:0,km:0,prov:1,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.VO9i_416Zf2_vGnM6rUbLQAAAA?w=257&h=193&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",quiz:{q:"福州的别称是？",a:"榕城"}},
            {pt:new BMapGL.Point(118.6759,24.8744),name:"泉州",title:"古建地标活了",phase:"begin",stage:"东南启程",date:"2023-06-13",zoom:13,mapType:BMAP_NORMAL_MAP,dedication:"GIS实验课上的历史建筑空间定位，我站在这里了。",desc:"红砖老厝，满街烟火气。面线糊加油条，一口下去整个人活了。开元寺东西塔伫立千年，课堂标注的古建坐标，此刻就在头顶。经纬度是死的，风是活的。",days:3,km:180,prov:1,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.WjIHpCqAwfvYgbERRfjKHwHaE7?w=300&h=199&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",quiz:{q:"泉州在宋元时期是什么港？",a:"东方第一大港"}},
            {pt:new BMapGL.Point(110.1794,25.2345),name:"桂林",title:"DEM照进现实",phase:"develop",stage:"西南寻幽",date:"2023-07-05",zoom:12,mapType:BMAP_SATELLITE_MAP,dedication:"GIS实验课上处理过的喀斯特地貌DEM，终于见到实景。",desc:"山从平地冒出来，像馒头。漓江上坐竹筏，船夫说从没见过骑车旅行的人。我处理过这里的DEM，知道每座山的海拔，但站在山脚下，感觉完全不同。",days:25,km:1230,prov:4,img:"https://tse3-mm.cn.bing.net/th/id/OIP-C.GJbAxrPLItNInO_TLDEsQHaE8?w=256&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",quiz:{q:"桂林山水属于什么地貌？",a:"喀斯特"}},
            {pt:new BMapGL.Point(100.2257,25.5894),name:"大理",title:"洱海骑行日",phase:"develop",stage:"西南寻幽",date:"2023-09-01",zoom:12,mapType:BMAP_SATELLITE_MAP,dedication:"从日出骑到日落，左边苍山，右边洱海。",desc:"洱海一圈130公里，从日出到日落。左边苍山，右边洱海，中间一条路。遥感影像里洱海是蓝色眼睛，我绕着她骑了一天，风里都是自由的味道。",days:83,km:2430,prov:6,img:"https://tse2-mm.cn.bing.net/th/id/OIP-C.eF6xZwn1IwGoK1UcAthNqAHaFj?w=266&h=200&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",quiz:{q:"与苍山相伴的湖泊是？",a:"洱海"}},
            {pt:new BMapGL.Point(104.0665,30.5723),name:"成都",title:"318零公里",phase:"develop",stage:"西南寻幽",date:"2023-11-15",zoom:12,mapType:BMAP_NORMAL_MAP,dedication:"318国道零公里，每一块里程碑都是经纬度坐标。",desc:"吃火锅、看熊猫。最触动我的是318零公里路牌，无数骑行者从这里去拉萨。我学空间定位，这一刻，我自己就是那个移动的定位点。",days:158,km:3330,prov:7,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.WU5zm17SfZmmUVEs0BNfXQHaE7?w=226&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",quiz:{q:"318国道的零公里位于哪个城市？",a:"成都"}},
            {pt:new BMapGL.Point(91.1409,29.6500),name:"拉萨",title:"站在卫星影像里",phase:"climax",stage:"西北逐风",date:"2024-08-01",zoom:13,mapType:BMAP_NORMAL_MAP,dedication:"卫星影像上的地方，我站在了这里。",desc:"最难、最震撼的一段。青藏线海拔超5000米，高反头疼欲裂，但看到布达拉宫的那一刻，一切都值得。卫星图上的圣地，我亲自抵达。",days:418,km:7430,prov:11,img:"https://tse3-mm.cn.bing.net/th/id/OIP-C.TcA75iulva1F5mVO-shepAHaE7?w=227&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",isClimax:true,quiz:{q:"布达拉宫位于哪个城市？",a:"拉萨"},lockLayer:BMAP_EARTH_MAP},
            {pt:new BMapGL.Point(98.2773,39.7866),name:"嘉峪关",title:"长城的尽头",phase:"climax",stage:"西北逐风",date:"2024-03-20",zoom:12,mapType:BMAP_SATELLITE_MAP,dedication:"打开地图，坐标我记得很熟。但不是看数据，是站在这里。",desc:"兰州牛肉面，只有兰州才正宗。嘉峪关是长城的尽头，城墙外一片戈壁。河西走廊数字化制图我做过很多次，但站在这里，风里都是沙子。",days:284,km:5030,prov:9,img:"https://tse4-mm.cn.bing.net/th/id/OIP-C.BZT8tDWOqtBZUkkRMtAdUwHaE7?w=268&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",quiz:{q:"明长城西端起点是？",a:"嘉峪关"}},
            {pt:new BMapGL.Point(94.6003,40.1356),name:"敦煌",title:"丝路印记",phase:"climax",stage:"西北逐风",date:"2024-10-01",zoom:12,mapType:BMAP_SATELLITE_MAP,dedication:"GIS里的古丝绸之路节点，沙漠中的绿洲。",desc:"鸣沙山、月牙泉，在卫星图上是沙漠中的蓝色光点。千年丝路，坐标永恒，我站在这里，触摸历史与GIS的交汇点。",days:480,km:9200,prov:12,img:"https://tse2-mm.cn.bing.net/th/id/OIP-C.7Z7F07Z7Q8X0ZQ8X0Z8X0ZAAAA?w=260&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",quiz:{q:"敦煌最著名的石窟是？",a:"莫高窟"}},
            {pt:startPt,name:"福州",title:"从这儿走的",phase:"end",stage:"北归终章",date:"2025-12-01",zoom:11,mapType:BMAP_NORMAL_MAP,dedication:"我用代码理解土地，幻想用车轮亲吻它。两种方式，我都走完了中国。",desc:"两年半，绕中国一圈。自行车换了三套胎，驮包磨破洞。回到福州，闷热依旧，空气黏湿。我吃了锅边糊，老板问从哪来。我说：从这儿走的。",days:910,km:14000,prov:14,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.v-FFPI0yoFyIl5_G8fCwrwHaE6?w=254&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3",isEnd:true,quiz:{q:"骑行的起点和终点是？",a:"福州"}}
        ];

        let storyData = [...baseStory];
        let branchApplied = false;
        let lhasaUnlocked = false;
        let idx = 0, isMoving = false, isAuto = false, layerIdx = 0;
        let MOVE_STEP = 200, MOVE_DELAY = 80, STAY_TIME = 13000;
        
        // 骑行路线与骑手
        const rider = new BMapGL.Marker(startPt,{
            icon: new BMapGL.Icon("https://api.map.baidu.com/images/markers/green.png", new BMapGL.Size(28,28), {anchor: new BMapGL.Size(14,14)})
        });
        map.addOverlay(rider);
        
        const dynamicLine = new BMapGL.Polyline([startPt], {
            strokeColor:"#14b8a6", strokeWeight:5
        });
        map.addOverlay(dynamicLine);
        
        const stationMarkers = [];
        storyData.forEach((station,i) => {
            const marker = new BMapGL.Marker(station.pt);
            marker.addEventListener("click", () => {
                if(!isMoving) jumpToStation(i);
            });
            map.addOverlay(marker);
            stationMarkers.push(marker);
        });
        
        // 速度控制
        document.getElementById("speedSelect").addEventListener("change", (e) => {
            const v = parseFloat(e.target.value);
            MOVE_DELAY = 80 / v;
            STAY_TIME = 13000 / v;
        });
        
        // 章节切换
        function updateChapter() {
            document.querySelectorAll(".chapter-step").forEach(step => {
                step.classList.toggle("active", step.dataset.phase === storyData[idx].phase);
            });
        }
        
        // 进度更新
        function updateProgress() {
            const p = (idx / (storyData.length - 1)) * 100;
            document.getElementById("progressFill").style.width = p + "%";
            document.getElementById("mileageSlider").value = storyData[idx].km;
            document.getElementById("sliderKm").innerText = storyData[idx].km + " km";
        }
        
        // 数据刷新
        function refreshData() {
            const curr = storyData[idx];
            document.getElementById("data_days").innerText = curr.days;
            document.getElementById("data_km").innerText = curr.km + " km";
            document.getElementById("data_prov").innerText = curr.prov;
            document.getElementById("data_alt").innerText = altitudes[idx] + " m";
            document.getElementById("data_stage").innerText = curr.stage;
            updateProgress();
        }
        
        // 显示站点
        function showStation() {
            document.getElementById("storyPanel").classList.add("show");
            document.getElementById("ridingPanel").classList.remove("active");
            dynamicLine.hide();
            
            const curr = storyData[idx];
            document.getElementById("dedication").innerText = curr.dedication;
            document.getElementById("phaseTag").className = "phase-tag phase-" + curr.phase;
            document.getElementById("phaseTag").innerText = curr.stage;
            document.getElementById("stationTitle").innerHTML = `${idx === 0 ? "🚩起点" : idx === storyData.length - 1 ? "🏁终点" : `📍${idx+1}站`} | ${curr.name}·${curr.title}`;
            document.getElementById("stationDate").innerText = curr.date;
            document.getElementById("stationDesc").innerHTML = curr.desc;
            document.getElementById("storyImg").src = curr.img;
            
            refreshData();
            updateChapter();
            map.centerAndZoom(curr.pt, curr.zoom);
            map.setMapType(curr.mapType);
            document.getElementById("layerBtn").innerText = layerModes.find(m => m.type === map.getMapType())?.name || "标准图";
            
            if(curr.isClimax) {
                document.getElementById("climaxToast").classList.add("show");
                setTimeout(() => document.getElementById("climaxToast").classList.remove("show"), 4000);
            }
            if(curr.isEnd) {
                document.getElementById("endingToast").classList.add("show");
                setTimeout(() => document.getElementById("endingToast").classList.remove("show"), 6000);
            }
            
            // 刷新题目
            if(curr.quiz) {
                document.getElementById("quizQuestion").innerText = `📖 ${curr.quiz.q}`;
                document.getElementById("quizArea").style.display = "block";
                document.getElementById("quizAnswer").value = "";
                document.getElementById("quizFeedback").innerText = "";
            } else {
                document.getElementById("quizArea").style.display = "none";
            }
            
            if(curr.name === "成都" && !branchApplied) {
                applyBranch();
            }
            checkLayerForLhasa();
            // 绘制红蓝小点（纯新增，不改动任何原有代码）
            drawStationPoints();
        }
        
        // ====================== 精准恢复：骑行中完整文字叙述 ======================
        function showRiding(fromIdx, toIdx){ 
            document.getElementById('storyPanel').classList.remove('show');
            document.getElementById('ridingPanel').classList.add('active');
            const from = storyData[fromIdx], to = storyData[toIdx];
            const dist = Math.round(to.km - from.km), days = to.days - from.days;
            document.getElementById('ridingText').innerHTML = `🚴 骑行中 · ${from.name} → ${to.name}`;
            let routeDesc = "";
            if(from.name==="福州"&&to.name==="泉州") routeDesc="沿海岸线南下，红砖古厝渐多，闽南烟火气越来越浓";
            else if(from.name==="泉州"&&to.name==="桂林") routeDesc="穿越粤北湘南，喀斯特地貌初现，山水渐入佳境";
            else if(from.name==="桂林"&&to.name==="大理") routeDesc="经云贵高原，海拔渐升，苍山洱海遥遥在望";
            else if(from.name==="大理"&&to.name==="成都") routeDesc="穿越横断山边缘，进入四川盆地，抵达318起点";
            else if(from.name==="成都"&&to.name==="拉萨") routeDesc="青藏线天路，翻越5000米海拔，直达雪域圣城";
            else if(from.name==="成都"&&to.name==="嘉峪关") routeDesc="沿河西走廊西进，戈壁大漠与长城遗迹相伴";
            else if(from.name==="嘉峪关"&&to.name==="敦煌") routeDesc="穿越戈壁无人区，抵达丝路明珠敦煌";
            else if(from.name==="敦煌"&&to.name==="福州") routeDesc="跨越大半个中国，从西北戈壁回到东南沿海";
            else if(from.name==="拉萨"&&to.name==="福州") routeDesc="从雪域高原出发，穿越山川湖海，圆满归乡";
            else routeDesc=`穿越千里山河，一路风景相伴前行`;
            
            document.getElementById('ridingRoute').innerHTML = `从 <b>${from.name}</b> 出发，前往 <b>${to.name}</b><br>行程 <b>${dist}</b> 公里，历时 <b>${days}</b> 天`;
            document.getElementById('ridingInfo').innerHTML = `<b>阶段：</b>${from.stage} → ${to.stage}<br><b>路线亮点：</b>${routeDesc}<br><b>GIS视角：</b>代码坐标化作真实车辙`;
            refreshData(); updateChapter();
        }
        // ======================================================================
        
        // 移动到下一站
        function moveNext() {
            if(isMoving || idx >= storyData.length - 1) return;
            isMoving = true;
            const A = storyData[idx].pt;
            const B = storyData[idx + 1].pt;
            const oldIdx = idx;
            idx++;
            
            dynamicLine.show();
            map.setViewport([A, B]);
            showRiding(oldIdx, idx);
            
            const path = [];
            for(let i=0; i<=MOVE_STEP; i++) {
                const t = i / MOVE_STEP;
                path.push(new BMapGL.Point(
                    A.lng + (B.lng - A.lng) * t,
                    A.lat + (B.lat - A.lat) * t
                ));
            }
            
            let step = 0;
            const interval = setInterval(() => {
                rider.setPosition(path[step]);
                dynamicLine.setPath([...dynamicLine.getPath(), path[step]]);
                step++;
                if(step >= path.length) {
                    clearInterval(interval);
                    isMoving = false;
                    showStation();
                    if(isAuto) setTimeout(moveNext, STAY_TIME);
                }
            }, MOVE_DELAY);
        }
        
        // 跳转到指定站点
        function jumpToStation(i) {
            idx = i;
            const fullPath = [storyData[0].pt];
            for(let s=1; s<=idx; s++) {
                const prev = storyData[s-1].pt;
                const curr = storyData[s].pt;
                for(let j=1; j<=10; j++) {
                    const t = j / 10;
                    fullPath.push(new BMapGL.Point(
                        prev.lng + (curr.lng - prev.lng) * t,
                        prev.lat + (curr.lat - prev.lat) * t
                    ));
                }
            }
            dynamicLine.setPath(fullPath);
            rider.setPosition(storyData[idx].pt);
            showStation();
        }
        
        // 成都分支选择
        function applyBranch() {
            if(branchApplied) return;
            const choice = confirm("🧭 到达成都，接下来你想？\n\n✅ 确定：走青藏线→拉萨（挑战高原）\n❌ 取消：走河西走廊→嘉峪关→敦煌（丝路风光）");
            branchApplied = true;
            if(choice) {
                storyData = [baseStory[0],baseStory[1],baseStory[2],baseStory[3],baseStory[4],baseStory[5],baseStory[8]];
            } else {
                storyData = [baseStory[0],baseStory[1],baseStory[2],baseStory[3],baseStory[4],baseStory[6],baseStory[7],baseStory[8]];
            }
            idx = 4;
            jumpToStation(4);
        }
        
        // 拉萨图层检查
        function checkLayerForLhasa() {
            const curr = storyData[idx];
            if(curr.name === "拉萨" && !lhasaUnlocked) {
                if(map.getMapType() === curr.lockLayer) {
                    lhasaUnlocked = true;
                    alert("✅ 地球模式解锁成功！");
                    document.getElementById("panelNextBtn").disabled = false;
                } else {
                    document.getElementById("panelNextBtn").disabled = true;
                    document.getElementById("quizFeedback").innerText = "⚠️ 必须切换到地球模式才能继续！";
                }
            } else {
                document.getElementById("panelNextBtn").disabled = false;
            }
        }
        
        // 答题提交
        document.getElementById("submitQuiz").onclick = () => {
            const curr = storyData[idx];
            const ans = document.getElementById("quizAnswer").value.trim();
            if(ans === curr.quiz.a) {
                document.getElementById("quizFeedback").innerText = "✅ 回答正确！";
            } else {
                document.getElementById("quizFeedback").innerText = `❌ 正确答案：${curr.quiz.a}`;
            }
        };
        
        // 里程滑块
        document.getElementById("mileageSlider").addEventListener("input", (e) => {
            if(isMoving) return;
            const km = parseInt(e.target.value);
            document.getElementById("sliderKm").innerText = km + " km";
            
            let targetStation = storyData[0];
            for(let s=1; s<storyData.length; s++) {
                if(km <= storyData[s].km) {
                    targetStation = storyData[s-1];
                    break;
                }
            }
            rider.setPosition(targetStation.pt);
        });
        
        // 按钮事件
        document.getElementById("panelNextBtn").onclick = () => {
            if(!isMoving) moveNext();
        };
        document.getElementById("panelPrevBtn").onclick = () => {
            if(idx > 0 && !isMoving) jumpToStation(idx - 1);
        };
        document.getElementById("autoBtn").onclick = () => {
            if(isMoving) return;
            isAuto = !isAuto;
            document.getElementById("autoBtn").innerText = isAuto ? "⏸ 暂停" : "▶ 自动播放";
            if(isAuto) setTimeout(moveNext, STAY_TIME);
        };
        document.getElementById("resetBtn").onclick = () => {
            isAuto = false;
            document.getElementById("autoBtn").innerText = "▶ 自动播放";
            storyData = [...baseStory];
            branchApplied = false;
            lhasaUnlocked = false;
            jumpToStation(0);
        };
        document.getElementById("layerBtn").onclick = () => {
            layerIdx = (layerIdx + 1) % 3;
            map.setMapType(layerModes[layerIdx].type);
            document.getElementById("layerBtn").innerText = layerModes[layerIdx].name;
            checkLayerForLhasa();
        };
        
        // ==============================================
        // 纯新增：红蓝小点（合适大小，不改动任何原有代码）
        // ==============================================
        const stationPoints = [];
        const stationInfo = {
            福州:{info:"福州，别称榕城，闽江穿城，气候闷热潮湿，是东南沿海重要中心城市。",event:"偶遇资深骑友，分享进藏路线经验，赠送修车工具。"},
            泉州:{info:"泉州，宋元东方第一大港，古城完整，是海上丝绸之路起点城市。",event:"品尝地道面线糊，体力恢复满格，烟火气十足。"},
            桂林:{info:"桂林，典型喀斯特地貌，漓江山水甲天下，是GIS地形经典案例城市。",event:"漓江船夫赠送山水纪念照，旅途回忆满满。"},
            大理:{info:"大理，苍山洱海相伴，风景秀丽，是环湖骑行爱好者的胜地。",event:"偶遇骑行小队，结伴同行，旅途不再孤单。"},
            成都:{info:"成都，318国道起点，进藏骑行大本营，火锅与熊猫是城市标志。",event:"火锅店老板赠送特色小吃，为进藏之旅加油。"},
            拉萨:{info:"拉萨，青藏高原核心城市，布达拉宫地标，海拔高易高反的圣城。",event:"获得藏族同胞哈达祝福，高原旅途圆满。"},
            嘉峪关:{info:"嘉峪关，明长城西端起点，河西走廊重镇，古丝绸之路交通要冲。",event:"聆听长城守护者讲述历史，感受历史厚重。"},
            敦煌:{info:"敦煌，莫高窟与鸣沙山月牙泉闻名，古丝绸之路文化遗产城市。",event:"夜晚观赏沙漠星空，体验大漠独有的宁静壮阔。"}
        };

        // 绘制合适大小的红蓝小点
        function drawStationPoints() {
            stationPoints.forEach(p => map.removeOverlay(p));
            stationPoints.length = 0;

            storyData.forEach(sta => {
                const name = sta.name;
                if(!stationInfo[name]) return;

                // 蓝色小点：当地介绍
                const infoPt = new BMapGL.Point(sta.pt.lng + 0.01, sta.pt.lat + 0.01);
                const infoCircle = new BMapGL.Circle(infoPt, 200, {
                    fillColor:"#007bff", fillOpacity:0.7, strokeColor:"#fff", strokeWeight:1
                });
                infoCircle.addEventListener("click", () => alert(`📍 ${name}介绍\n\n${stationInfo[name].info}`));
                map.addOverlay(infoCircle);
                stationPoints.push(infoCircle);

                // 红色小点：随机事件
                const eventPt = new BMapGL.Point(sta.pt.lng - 0.01, sta.pt.lat - 0.01);
                const eventCircle = new BMapGL.Circle(eventPt, 200, {
                    fillColor:"#dc3545", fillOpacity:0.7, strokeColor:"#fff", strokeWeight:1
                });
                eventCircle.addEventListener("click", () => alert(`🎲 随机事件\n\n${stationInfo[name].event}`));
                map.addOverlay(eventCircle);
                stationPoints.push(eventCircle);
            });
        }
        // ==============================================

        // 初始化
        jumpToStation(0);
    </script>
</body>
</html>
