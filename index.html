<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>如果2023年我没有读大学 | 林宇浩 3235706088 | 空间信息与数字技术</title>
    <script src="https://api.map.baidu.com/api?type=webgl&v=1.0&ak=xhldCkmJHJM7LEs1fvSpe7z5lILxF8MF"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body,html{width:100%;height:100%;overflow:hidden;font-family:"Segoe UI","微软雅黑","PingFang SC",sans-serif;background:#0f172a;}
        #map-container{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1;}
        /* 顶部章节 */
        .chapter-bar{
            position:absolute;top:0;left:0;right:0;z-index:9999;
            background:rgba(15,23,42,0.88);backdrop-filter:blur(12px);
            padding:10px 24px;display:flex;align-items:center;gap:10px;
            border-bottom:1px solid rgba(255,255,255,0.08);
            height:48px;
        }
        .chapter-step{
            flex:1;text-align:center;font-size:12px;color:#64748b;
            padding:6px 4px;border-radius:20px;transition:0.4s;position:relative;
        }
        .chapter-step.active{background:linear-gradient(135deg,#3388ff,#06b6d4);color:#fff;font-weight:700;box-shadow:0 0 16px rgba(51,136,255,0.35);}
        .chapter-step::after{content:'→';position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:#334155;font:10px;}
        .chapter-step:last-child::after{display:none;}
        /* 控制按钮：紧贴章节栏下方 */
        .top-right-controls{
            position:absolute;top:52px;right:16px;z-index:9999;
            display:flex;gap:8px;
            background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);
            padding:8px 12px;border-radius:12px;
            border:1px solid rgba(255,255,255,0.06);
        }
        .btn{
            padding:7px 14px;border:none;border-radius:8px;
            background:#3388ff;color:#fff;font-weight:600;cursor:pointer;font-size:12px;
            transition:0.2s;white-space:nowrap;
        }
        .btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
        .btn:disabled{background:#1e293b;color:#475569;cursor:not-allowed;}
        .btn-auto{background:#d97706;}
        .btn-next{background:#3388ff;}
        .btn-reset{background:#dc2626;}
        .btn-layer{background:#059669;}
        /* 左侧纯故事面板 */
        .story-panel{
            position:absolute;top:108px;left:18px;z-index:9999;
            background:rgba(15,23,42,0.94);backdrop-filter:blur(20px);
            border-radius:18px;padding:22px;width:380px;
            border:1px solid rgba(255,255,255,0.06);
            max-height:calc(100vh - 140px);
        }
        .dedication{
            font-size:11px;color:#94a3b8;font-style:italic;margin-bottom:10px;
            padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06);
            line-height:1.5;
        }
        .phase-tag{
            display:inline-block;padding:3px 12px;border-radius:20px;
            font-size:11px;font-weight:700;margin-bottom:10px;
        }
        .phase-begin{background:#10b981;color:#fff;}
        .phase-develop{background:#f59e0b;color:#fff;}
        .phase-climax{background:#ef4444;color:#fff;animation:pulse 2.5s infinite;}
        .phase-end{background:#8b5cf6;color:#fff;}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.35);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}}
        .station-title{font-size:18px;font-weight:700;color:#f8fafc;margin-bottom:6px;line-height:1.3;}
        .station-date{font-size:12px;color:#64748b;margin-bottom:12px;}
        .story-img{
            width:100%;height:180px;object-fit:cover;border-radius:14px;margin-bottom:14px;
            border:1px solid rgba(255,255,255,0.08);
        }
        .station-desc{
            font-size:13.5px;line-height:1.7;color:#cbd5e1;
            text-align:justify;
        }
        .gis-tag{
            display:inline-block;background:rgba(51,136,255,0.15);color:#60a5fa;
            padding:2px 8px;border-radius:6px;font-size:11px;margin-right:4px;
        }
        /* 骑行中状态面板（移动时显示） */
        .riding-panel{
            position:absolute;top:108px;left:18px;z-index:9999;
            background:rgba(15,23,42,0.94);backdrop-filter:blur(20px);
            border-radius:18px;padding:22px;width:380px;
            border:1px solid rgba(255,255,255,0.06);
            display:none;
        }
        .riding-panel.active{display:block;}
        .riding-status{
            font-size:14px;color:#f8fafc;font-weight:700;margin-bottom:14px;
            display:flex;align-items:center;gap:8px;
        }
        .riding-dot{
            width:10px;height:10px;border-radius:50%;background:#10b981;
            animation:blink 1s infinite;
        }
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
        .riding-route{
            font-size:13px;color:#cbd5e1;line-height:1.8;margin-bottom:14px;
            padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .riding-info{
            font-size:12px;color:#94a3b8;line-height:1.8;
        }
        .riding-info b{color:#60a5fa;}
        /* 右下角骑行数据面板 */
        .data-panel{
            position:absolute;bottom:20px;right:20px;z-index:9999;
            background:rgba(15,23,42,0.94);backdrop-filter:blur(20px);
            border-radius:18px;padding:18px 20px;width:260px;
            box-shadow:0 16px 48px rgba(0,0,0,0.4);
            border:1px solid rgba(255,255,255,0.06);
        }
        .data-title{font-size:13px;font-weight:700;color:#f8fafc;margin-bottom:12px;}
        .data-item{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);}
        .data-item:last-child{border:none;}
        .data-item span:first-child{color:#94a3b8;}
        .data-item span:last-child{color:#f1f5f9;font-weight:600;}
        /* 高潮/结尾提示 */
        .climax-toast{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10000;
            background:rgba(239,68,68,0.95);color:#fff;padding:20px 36px;border-radius:20px;
            font-size:20px;font-weight:700;pointer-events:none;opacity:0;transition:0.5s;
        }
        .climax-toast.show{opacity:1;}
        .ending-toast{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10000;
            background:rgba(139,92,246,0.95);color:#fff;padding:24px 36px;border-radius:20px;
            font-size:16px;opacity:0;transition:0.7s;
        }
        .ending-toast.show{opacity:1;}
    </style>
</head>
<body>
    <div id="map-container"></div>
    <!-- 顶部章节 -->
    <div class="chapter-bar">
        <div class="chapter-step active" data-phase="begin">东南沿海</div>
        <div class="chapter-step" data-phase="develop">西南西部</div>
        <div class="chapter-step" data-phase="climax">西北边疆</div>
        <div class="chapter-step" data-phase="end">北方归途</div>
    </div>
    <!-- 控制按钮：紧贴章节栏下方 -->
    <div class="top-right-controls">
        <button class="btn btn-auto" id="autoBtn">▶ 自动播放</button>
        <button class="btn btn-next" id="nextBtn">下一站</button>
        <button class="btn btn-reset" id="resetBtn">重置</button>
        <button class="btn btn-layer" id="layerBtn">标准图</button>
    </div>
    <!-- 左侧站点故事面板（到达后显示） -->
    <div class="story-panel" id="storyPanel">
        <div class="dedication" id="dedication"></div>
        <div class="phase-tag" id="phaseTag"></div>
        <div class="station-title" id="stationTitle"></div>
        <div class="station-date" id="stationDate"></div>
        <img class="story-img" id="storyImg" alt="">
        <div class="station-desc" id="stationDesc"></div>
    </div>
    <!-- 左侧骑行中面板（移动时显示） -->
    <div class="riding-panel" id="ridingPanel">
        <div class="riding-status">
            <div class="riding-dot"></div>
            <span id="ridingText">骑行中 · 前往下一站</span>
        </div>
        <div class="riding-route" id="ridingRoute"></div>
        <div class="riding-info" id="ridingInfo"></div>
    </div>
    <!-- 右下角：骑行数据 -->
    <div class="data-panel">
        <div class="data-title">📊 骑行实时数据</div>
        <div class="data-item"><span>已骑行天数</span><span id="data_days">0</span></div>
        <div class="data-item"><span>累计里程</span><span id="data_km">0 km</span></div>
        <div class="data-item"><span>途经省份</span><span id="data_prov">1</span></div>
        <div class="data-item"><span>当前海拔</span><span id="data_alt">0 m</span></div>
        <div class="data-item"><span>当前阶段</span><span id="data_stage">东南沿海</span></div>
    </div>
    <!-- 特效 -->
    <div class="climax-toast" id="climaxToast">🔥 进入高潮 · 青藏高原·拉萨</div>
    <div class="ending-toast" id="endingToast">
        💜 圆满闭环<br>
       我用代码理解这片土地，幻想中的我，用车轮亲吻了它。
    </div>
    <script>
        const map = new BMapGL.Map("map-container");
        const startPt = new BMapGL.Point(119.3002, 26.0805);
        map.centerAndZoom(startPt, 11);
        map.enableScrollWheelZoom(true);
        map.setMapType(BMAP_NORMAL_MAP);
        map.addControl(new BMapGL.ScaleControl({anchor:BMAP_ANCHOR_BOTTOM_LEFT}));
        // 真实海拔数据
        const altitudes = [20, 20, 150, 2000, 500, 1500, 3650, 20];
        // 图层模式配置
        const layerModes = [
            {type: BMAP_NORMAL_MAP, name: "标准图"},
            {type: BMAP_SATELLITE_MAP, name: "卫星图"},
            {type: BMAP_EARTH_MAP, name: "地球模式"}
        ];
        // 站点数据
        const storyData = [
            {
                pt:startPt,name:"福州",title:"榕树下的出发",phase:"begin",stage:"东南沿海",
                date:"2023-06-10",zoom:11,mapType:BMAP_NORMAL_MAP,
                dedication:"这个故事是假的。现实中我进入福建农林大学就读空间信息与数字技术专业。但幻想中的我，用车轮亲吻了课堂上处理过的每一寸土地。",
                desc:"六月的福州闷得要死，空气像一块湿毛巾捂在脸上。我在闽江边站了很久——每年这个时候我都说要走，但真要走的那天，还是犹豫了。<br><br>我在车把绑了一面小旗子，写着：出发。<br><br><span class='gis-tag'>GIS视角</span>这是我用代码画过无数次的城市，这一次，我亲自成为移动点。",
                days:0,km:0,prov:1,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.VO9i_416Zf2_vGnM6rUbLQAAAA?w=257&h=193&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            },
            {
                pt:new BMapGL.Point(118.6759,24.8744),name:"泉州",title:"古建坐标活了",phase:"begin",stage:"东南沿海",
                date:"2023-06-13",zoom:13,mapType:BMAP_NORMAL_MAP,
                dedication:"GIS实验课上的历史建筑空间定位，我站在这里了。",
                desc:"红砖老厝，满街烟火气。面线糊加油条，一口下去整个人活了。<br><br>开元寺东西塔伫立千年。<br><br><span class='gis-tag'>GIS视角</span>课堂标注的古建坐标，此刻就在头顶。经纬度是死的，风是活的。",
                days:3,km:180,prov:1,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.WjIHpCqAwfvYgbERRfjKHwHaE7?w=300&h=199&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            },
            {
                pt:new BMapGL.Point(110.1794,25.2345),name:"桂林",title:"DEM照进现实",phase:"develop",stage:"西南西部",
                date:"2023-07-05",zoom:12,mapType:BMAP_SATELLITE_MAP,
                dedication:"GIS实验课上处理过的喀斯特地貌DEM，终于见到实景。",
                desc:"山从平地冒出来，像馒头。漓江上坐竹筏，船夫说从没见过骑车旅行的人。<br><br><span class='gis-tag'>GIS视角</span>我处理过这里的DEM，知道每座山的海拔，但站在山脚下，感觉完全不同。",
                days:25,km:1230,prov:4,img:"https://tse3-mm.cn.bing.net/th/id/OIP-C.GJ7bAxrPLItNInO_TLDEsQHaE8?w=256&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            },
            {
                pt:new BMapGL.Point(100.2257,25.5894),name:"大理",title:"洱海骑行日",phase:"develop",stage:"西南西部",
                date:"2023-09-01",zoom:12,mapType:BMAP_SATELLITE_MAP,
                dedication:"从日出骑到日落，左边苍山，右边洱海。",
                desc:"洱海一圈130公里，从日出到日落。左边苍山，右边洱海，中间一条路。<br><br><span class='gis-tag'>GIS视角</span>遥感影像里洱海是蓝色眼睛，我绕着她骑了一天。",
                days:83,km:2430,prov:6,img:"https://tse2-mm.cn.bing.net/th/id/OIP-C.eF6xZwn1IwGoK1UcAthNqAHaFj?w=266&h=200&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            },
            {
                pt:new BMapGL.Point(104.0665,30.5723),name:"成都",title:"318零公里",phase:"develop",stage:"西南西部",
                date:"2023-11-15",zoom:12,mapType:BMAP_NORMAL_MAP,
                dedication:"318国道零公里，每一块里程碑都是经纬度坐标。",
                desc:"吃火锅、看熊猫。最触动我的是318零公里路牌。无数骑行者从这里去拉萨。<br><br><span class='gis-tag'>GIS视角</span>我学空间定位，这一刻，我自己就是定位点。",
                days:158,km:3330,prov:7,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.WU5zm17SfZmmUVEs0BNfXQHaE7?w=226&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            },
            {
                pt:new BMapGL.Point(98.2773,39.7866),name:"嘉峪关",title:"长城的尽头",phase:"climax",stage:"西北边疆",
                date:"2024-03-20",zoom:12,mapType:BMAP_SATELLITE_MAP,
                dedication:"打开地图，坐标我记得很熟。但不是看数据，是站在这里。",
                desc:"兰州牛肉面，只有兰州才正宗。嘉峪关是长城尽头，城墙外一片戈壁。<br><br><span class='gis-tag'>GIS视角</span>河西走廊数字化制图我做过很多次，但站在这里，风里都是沙子。",
                days:284,km:5030,prov:9,img:"https://tse4-mm.cn.bing.net/th/id/OIP-C.BZT8tDWOqtBZUkkRMtAdUwHaE7?w=268&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            },
            {
                pt:new BMapGL.Point(91.1409,29.6500),name:"拉萨",title:"站在卫星影像里",phase:"climax",stage:"西北边疆",
                date:"2024-08-01",zoom:13,mapType:BMAP_EARTH_MAP,
                dedication:"卫星影像上的地方，我站在了这里。",
                desc:"最难、最震撼的一段。青藏线海拔超5000米，高反头疼欲裂，但看到布达拉宫，一切都值得。<br><br><span class='gis-tag'>GIS视角</span>卫星图上的圣地，我亲自抵达。",
                days:418,km:7430,prov:11,img:"https://tse3-mm.cn.bing.net/th/id/OIP-C.TcA75iulva1F5mVO-shepAHaE7?w=227&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            },
            {
                pt:startPt,name:"福州",title:"从这儿走的",phase:"end",stage:"北方归途",
                date:"2025-12-01",zoom:11,mapType:BMAP_NORMAL_MAP,
                dedication:"我用代码理解土地，幻想用车轮亲吻它。两种方式，我都走完了中国。",
                desc:"两年半，绕中国一圈。自行车换了三套胎，驮包磨破洞。回到福州，闷热依旧，空气黏湿。<br><br>我吃了锅边糊，老板问从哪来。我说：从这儿走的。<br><br><span class='gis-tag'>GIS视角</span>代码与车轮，我用两种方式，爱同一片土地。",
                days:910,km:12000,prov:14,img:"https://tse1-mm.cn.bing.net/th/id/OIP-C.v-FFPI0yoFyIl5_G8fCwrwHaE6?w=254&h=180&c=7&r=0&o=7&dpr=1.9&pid=1.7&rm=3"
            }
        ];
        // 路线与标记
        let rider = new BMapGL.Marker(startPt, {
            icon:new BMapGL.Icon("https://api.map.baidu.com/images/markers/red.png",new BMapGL.Size(28,28),{anchor:new BMapGL.Size(14,14)})
        });
        map.addOverlay(rider);
        const dynamicLine = new BMapGL.Polyline([startPt],{strokeColor:"#ff3333",strokeWeight:5,strokeOpacity:0.9});
        map.addOverlay(dynamicLine);
        // 全局参数
        let idx = 0;
        let isMoving = false;
        let isAuto = false;
        let timer = null;
        let layerIdx = 0;
        // 移动参数
        const MOVE_STEP = 200;
        const MOVE_DELAY = 80;
        const STAY_TIME = 20000;
        // 更新章节
        function updateChapter(){
            document.querySelectorAll('.chapter-step').forEach((e,i)=>{
                e.classList.toggle('active', i === Math.floor(idx/2));
            });
        }
        // 刷新数据
        function refreshData(){
            const c = storyData[idx];
            document.getElementById('data_days').innerText = c.days;
            document.getElementById('data_km').innerText = c.km + ' km';
            document.getElementById('data_prov').innerText = c.prov;
            document.getElementById('data_alt').innerText = altitudes[idx] + ' m';
            document.getElementById('data_stage').innerText = c.stage;
        }
        // 显示站点故事面板
        function showStation(){
            document.getElementById('storyPanel').style.display = 'block';
            document.getElementById('ridingPanel').classList.remove('active');
            // 到达站点后隐藏红线，避免突兀
            dynamicLine.hide();
            const c = storyData[idx];
            document.getElementById('dedication').innerText = c.dedication;
            const tag = document.getElementById('phaseTag');
            tag.className = 'phase-tag phase-'+c.phase;
            tag.innerText = c.stage;
            document.getElementById('stationTitle').innerText = `${idx===0?'🚩 起点':idx===7?'🏁 终点':`📍 ${idx+1}站`}｜${c.name}·${c.title}`;
            document.getElementById('stationDate').innerText = c.date;
            document.getElementById('stationDesc').innerHTML = c.desc;
            document.getElementById('storyImg').src = c.img;
            refreshData();
            updateChapter();
            // 切换站点专属图层
            if(c.mapType){
                try{ map.setMapType(c.mapType); }
                catch(e){ map.setMapType(BMAP_NORMAL_MAP); }
            }
            const modeName = layerModes.find(m=>m.type===(c.mapType||BMAP_NORMAL_MAP))?.name || "标准图";
            document.getElementById('layerBtn').innerText = modeName;
            layerIdx = layerModes.findIndex(m=>m.name===modeName);
            map.centerAndZoom(c.pt, c.zoom);
            const climax = document.getElementById('climaxToast');
            const ending = document.getElementById('endingToast');
            climax.classList.remove('show');
            ending.classList.remove('show');
            if(c.isClimax){climax.classList.add('show');setTimeout(()=>climax.classList.remove('show'),3000);}
            if(c.isEnd){ending.classList.add('show');setTimeout(()=>ending.classList.remove('show'),4500);}
        }
        // 显示骑行中面板
        function showRiding(fromIdx, toIdx){
            document.getElementById('storyPanel').style.display = 'none';
            document.getElementById('ridingPanel').classList.add('active');
            const from = storyData[fromIdx];
            const to = storyData[toIdx];
            const dist = Math.round(to.km - from.km);
            const days = to.days - from.days;
            document.getElementById('ridingText').innerText = `🚴 骑行中 · ${from.name} → ${to.name}`;
            document.getElementById('ridingRoute').innerHTML = `
                从 <b>${from.name}</b> 出发，前往 <b>${to.name}</b><br>
                预计行程 <b>${dist}</b> 公里，历时约 <b>${days}</b> 天
            `;
            let routeDesc = "";
            if(fromIdx === 0 && toIdx === 1){
                routeDesc = "沿海岸线南下，经过莆田、惠安，红砖古厝越来越多。";
            } else if(fromIdx === 1 && toIdx === 2){
                routeDesc = "穿越江西、广东北部，进入广西。喀斯特地貌开始出现，山像馒头一样从平地冒出来。";
            } else if(fromIdx === 2 && toIdx === 3){
                routeDesc = "经贵州入云南，海拔逐渐爬升，梯田和峡谷交替出现。";
            } else if(fromIdx === 3 && toIdx === 4){
                routeDesc = "从大理北上，经丽江、泸沽湖边缘，进入四川盆地。";
            } else if(fromIdx === 4 && toIdx === 5){
                routeDesc = "沿河西走廊一路向西，兰州拉面、张掖丹霞、酒泉戈壁。";
            } else if(fromIdx === 5 && toIdx === 6){
                routeDesc = "青藏线最艰难的一段，翻越唐古拉山口，海拔超过5000米。";
            } else if(fromIdx === 6 && toIdx === 7){
                routeDesc = "从拉萨出发，经川藏线/滇藏线回程，跨越半个中国回到起点。";
            }
            document.getElementById('ridingInfo').innerHTML = `
                <b>当前阶段：</b>${from.stage} → ${to.stage}<br>
                <b>途经亮点：</b>${routeDesc}<br>
                <b>GIS视角：</b>代码里的坐标正在变成真实的车辙
            `;
            refreshData();
            updateChapter();
        }
        // 匀速平滑移动
        function moveNext(){
            if(idx >=7 || isMoving) return;
            isMoving = true;
            document.getElementById('nextBtn').disabled = true;
            const A = storyData[idx].pt;
            const B = storyData[idx+1].pt;
            const fromIdx = idx;
            idx++;
            // 移动时显示红线
dynamicLine.show();
            // 最后一段（拉萨→福州）：中国地图全国视角
            if(fromIdx === 6){
                map.setMapType(BMAP_NORMAL_MAP);
                map.setViewport([A, B], {zoomFactor: 0});
            } else {
                map.setViewport([A, B], {zoomFactor: -0.2});
                map.setMapType(BMAP_SATELLITE_MAP);
            }
            document.getElementById('layerBtn').innerText = (fromIdx === 6) ? "标准图" : "卫星图";
            layerIdx = (fromIdx === 6) ? 0 : 1;
            showRiding(fromIdx, idx);
            let path = [];
            for(let i=0; i<=MOVE_STEP; i++){
                let t = i/MOVE_STEP;
                let lng = A.lng + (B.lng - A.lng)*t;
                let lat = A.lat + (B.lat - A.lat)*t;
                path.push(new BMapGL.Point(lng, lat));
            }
            let step = 0;
            const iv = setInterval(()=>{
                let p = path[step];
                dynamicLine.setPath([...dynamicLine.getPath(), p]);
                rider.setPosition(p);
                step++;
                if(step >= path.length){
                    clearInterval(iv);
                    isMoving = false;
                    document.getElementById('nextBtn').disabled = false;
                    showStation();
                    // 自动播放：到达终点(idx==7)后彻底停止，不再循环
                    if(isAuto && idx < 7){
                        timer = setTimeout(moveNext, STAY_TIME);
                    } else if(isAuto && idx >= 7){
                        isAuto = false;
                        clearTimeout(timer);
                        document.getElementById('autoBtn').innerText = "▶ 自动播放";
                    }
                }
            }, MOVE_DELAY);
        }
        // 控制按钮
        function toggleAuto(){
            if(isAuto){
                isAuto = false;
                clearTimeout(timer);
                document.getElementById('autoBtn').innerText = "▶ 自动播放";
            } else {
                isAuto = true;
                document.getElementById('autoBtn').innerText = "⏸ 停止";
                if(!isMoving) moveNext();
            }
        }
        function reset(){
            clearTimeout(timer);
            isAuto = false;
            isMoving = false;
            idx = 0;
            dynamicLine.setPath([startPt]);
            rider.setPosition(startPt);
            document.getElementById('autoBtn').innerText = "▶ 自动播放";
            document.getElementById('nextBtn').disabled = false;
            showStation();
        }
        function toggleLayer(){
            layerIdx = (layerIdx + 1) % layerModes.length;
            const mode = layerModes[layerIdx];
            map.setMapType(mode.type);
            document.getElementById('layerBtn').innerText = mode.name;
        }
        // 绑定
        document.getElementById('nextBtn').onclick = ()=>{
            isAuto = false;
            clearTimeout(timer);
            document.getElementById('autoBtn').innerText = "▶ 自动播放";
            moveNext();
        };
        document.getElementById('autoBtn').onclick = toggleAuto;
        document.getElementById('resetBtn').onclick = reset;
        document.getElementById('layerBtn').onclick = toggleLayer;
        showStation();
    </script>
</body>
</html>
